<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bydleni.rs{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        // Theme: default dark, respect saved preference
        const saved = localStorage.getItem('theme');
        if (saved === 'light') document.documentElement.classList.add('light');
    </script>
</head>
<body>
    <nav class="nav">
        <div class="wrap nav-inner">
            <a href="/" class="nav-logo"><b>Bydleni</b>.rs</a>
            <div class="nav-right">
                <a href="/">Overview</a>
                <a href="/stories">Stories</a>
                <a href="/compare">Compare</a>
                <button id="theme-toggle" class="theme-btn" title="Toggle theme">
                    <svg class="icon-sun" style="display:none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.07 7.07l-1.41-1.41M8.34 8.34L6.93 6.93m12.14 0l-1.41 1.41M8.34 15.66l-1.41 1.41"/>
                    </svg>
                    <svg class="icon-moon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    {% block banner %}{% endblock %}

    <main class="wrap">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="wrap">
            Data sources:
            <a href="https://fred.stlouisfed.org">FRED</a> &middot;
            <a href="https://www.cnb.cz">CNB</a> &middot;
            <a href="https://www.czso.cz">CZSO</a> &middot;
            <a href="https://www.sreality.cz">Sreality</a>
            <br>Built with Rust + Axum + HTMX
        </div>
    </footer>

    <script>
    const toggle = document.getElementById('theme-toggle');
    const sun = toggle.querySelector('.icon-sun');
    const moon = toggle.querySelector('.icon-moon');
    function updateIcons() {
        const isLight = document.documentElement.classList.contains('light');
        sun.style.display = isLight ? 'block' : 'none';
        moon.style.display = isLight ? 'none' : 'block';
    }
    updateIcons();
    toggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('light');
        const isLight = document.documentElement.classList.contains('light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateIcons();
        // Notify charts of theme change
        window.dispatchEvent(new Event('themechange'));
    });
    </script>
    <script src="/static/charts.js"></script>
    <script src="/static/scenario.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
